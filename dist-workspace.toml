[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Also install a standalone `truewright-update` alongside the app itself,
# for anyone using the shell/powershell installer path (checks GitHub
# Releases and self-updates on request). The Windows Scheduled Task set up
# separately for this machine's own install does its own equivalent check
# directly rather than depending on this, since that install predates
# switching to the installer-script method.
install-updater = true
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
